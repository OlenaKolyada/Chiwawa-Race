<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <script defer src="js/race.js"></script>
    <!-- <link rel="stylesheet" href="css/style.css"> -->
    
    <title>Race</title>
  </head>
  <body>




    
    <div>
      <form>

        <p><label for="color">Choose your color:</label></p>
        <p><input type="radio" checked name="color" value="Red">Red
        <input type="radio" name="color" value="Blue">Blue
        <input type="radio" name="color" value="Yellow">Yellow
        <input type="radio" name="color" value="Green">Green
        </p>

        <p><label for="brand">Choose your brand:</label></p>
        <p><input type="radio" checked name="brand" value="Familiale">Familiale
        <input type="radio" name="brand" value="Citadine">Citadine
        <input type="radio" name="brand" value="Berline">Berline
        <input type="radio" name="brand" value="Mini">Mini
        </p>
        <p><button id="nice" type="button">Nice!</button>
          <input type="reset" value="Reset">
        </p>
      </form>
    </div>

   
    <div id="result">
      <h2>Your car</h2>
    </div>

  </body>
</html>
