<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <script defer src="js/race.js"></script>
    <link rel="stylesheet" href="css/style.css">
    
    <title>Race</title>
  </head>
  <body>
    <div class="main">
      <form>
        <div class="form"><label for="color">Choose your color:</label><br>
        <input type="radio" checked name="color" value="Red">Red
        <input type="radio" name="color" value="Blue">Blue
        <input type="radio" name="color" value="Yellow">Yellow
        <input type="radio" name="color" value="Green">Green
        </div>

        <div class="form"><label for="brand">Choose your brand:</label><br>
        <input type="radio" checked name="brand" value="Familiale">Familiale
        <input type="radio" name="brand" value="Citadine">Citadine
        <input type="radio" name="brand" value="Berline">Berline
        <input type="radio" name="brand" value="Mini">Mini
        </div>

        <p><button id="btn__create" type="button">Create a Car</button>
        <input type="reset" value="Reset" id="btn__reset">
        </p>
      </form>
    </div>
   
    <div class="main" id="result">
      
    </div>
    

  </body>
</html>
