<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <script defer src="js/chiwawa_race.js?v=4"></script>
    <link rel="stylesheet" href="css/style.css?v=3">
    <link rel="stylesheet" href="https://use.typekit.net/twz1xmt.css">
    <title>Chiwawa Race</title>
  </head>
  <body>
    <div id="rotate__overlay" aria-hidden="true">
      <div class="rotate__icon">&#128241;</div>
      <p id="rotate__message">Thanks for visiting! This game is currently available on a computer or tablet.</p>
    </div>
    <div class="container">
      <div id="race__track"></div>
      <div id="user__message">
          <span class="red">Welcome to Chiwawa Race!</span><br />
          Wanna play?
          <img src="img/chiwawa1.png" alt="Chiwawa">
      </div>

      <div id="buttons">
          <button id="btn__random" type="button">Create Racers</button>
          <input type="reset" value="Reset" id="btn__reset">
          <button id="btn__start" type="button">Start</button>
      </div>

      <div id="download">
          Download archives with code<br />
          <a href="download/Basic_Race.zip">Basic Race</a>
          <a href="download/Chiwawa_Race.zip">Chiwawa Race</a>
      </div>

      <div id="copyright">&copy; Funky Corgi<br />2023 - 2024</div>
    </div>
  </body>
</html>
